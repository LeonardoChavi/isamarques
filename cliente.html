<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Histórico — Isabela Marques</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dash-header { padding: 6rem 4rem 2.4rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1rem; }
    .dash-greeting { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.8rem, 3vw, 2.8rem); font-weight: 300; color: var(--text); }
    .dash-greeting em { font-style: italic; color: var(--rose); }
    .dash-main { padding: 3rem 4rem; max-width: 1100px; }
    .dash-section { margin-bottom: 3rem; }
    .dash-section-title { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 300; color: var(--text); margin-bottom: 1.4rem; }
    .dash-section-title em { font-style: italic; color: var(--rose); }
    .btn-logout { font-family: 'Jost', sans-serif; font-size: .78rem; letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted); background: transparent; border: 1px solid var(--border); padding: .55rem 1.2rem; cursor: pointer; transition: all .25s; text-decoration: none; }
    .btn-logout:hover { border-color: var(--rose-light); color: var(--rose); }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; margin-bottom: 3rem; }
    .stat-card { background: rgba(253,246,240,0.85); backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 1.6rem 2rem; }
    .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 300; color: var(--rose); line-height: 1; margin-bottom: .3rem; }
    .stat-label { font-size: .78rem; letter-spacing: .16em; text-transform: uppercase; color: var(--text-muted); }
    .agend-list { display: flex; flex-direction: column; gap: .8rem; }
    .agend-card { background: rgba(253,246,240,0.85); backdrop-filter: blur(8px); border: 1px solid var(--border); padding: 1.4rem 1.8rem; display: flex; align-items: center; gap: 1.6rem; }
    .agend-date { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; color: var(--rose); min-width: 60px; text-align: center; line-height: 1.2; }
    .agend-date span { display: block; font-size: .7rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); font-family: 'Jost', sans-serif; }
    .agend-info { flex: 1; }
    .agend-servico { font-size: 1rem; font-weight: 400; color: var(--text); margin-bottom: .2rem; }
    .agend-obs { font-size: .88rem; font-weight: 300; color: var(--text-muted); }
    .agend-status { font-size: .72rem; letter-spacing: .16em; text-transform: uppercase; padding: .3rem .8rem; border: 1px solid; }
    .agend-status.pendente { color: #7a6020; border-color: #d4b870; background: #fdf8e8; }
    .agend-status.confirmado { color: #2a5e3f; border-color: #a0c4b2; background: #f0fdf6; }
    .agend-status.cancelado { color: #8f2a2a; border-color: #d4a0a0; background: #fdf0f0; }
    .sessoes-list { display: flex; flex-direction: column; gap: 1.4rem; }
    .sessao-card { background: rgba(253,246,240,0.85); backdrop-filter: blur(8px); border: 1px solid var(--border); overflow: hidden; }
    .sessao-header { padding: 1.4rem 1.8rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .sessao-header:hover { background: rgba(185,122,138,0.04); }
    .sessao-data { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 300; color: var(--rose-deep); margin-right: 1.4rem; }
    .sessao-servico { font-size: 1rem; font-weight: 400; color: var(--text); }
    .sessao-toggle { font-size: .76rem; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); }
    .sessao-body { display: none; padding: 1.4rem 1.8rem; border-top: 1px solid var(--border); }
    .sessao-body.open { display: block; }
    .sessao-obs { font-size: .96rem; font-weight: 300; color: var(--text-muted); line-height: 1.8; margin-bottom: 1.2rem; }
    .fotos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .8rem; margin-bottom: 1.2rem; }
    .foto-item { aspect-ratio: 1; overflow: hidden; border: 1px solid var(--border); cursor: pointer; position: relative; }
    .foto-item img { width: 100%; height: 100%; object-fit: cover; transition: transform .3s; }
    .foto-item:hover img { transform: scale(1.05); }
    .foto-tipo { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.45); color: white; font-size: .65rem; letter-spacing: .14em; text-transform: uppercase; padding: .25rem .5rem; text-align: center; }
    .produtos-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
    .produto-tag { font-size: .78rem; letter-spacing: .1em; text-transform: uppercase; color: var(--rose-deep); border: 1px solid var(--rose-light); background: var(--rose-pale); padding: .25rem .7rem; }
    .empty-state { text-align: center; padding: 3rem 2rem; border: 1px dashed var(--border); }
    .empty-icon { font-size: 2rem; margin-bottom: .8rem; opacity: .4; }
    .empty-text { font-size: .9rem; font-weight: 300; color: var(--text-muted); line-height: 1.8; }
    .loading { text-align: center; padding: 3rem; font-size: .9rem; font-weight: 300; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; }
    .lightbox { position: fixed; inset: 0; background: rgba(30,20,20,.88); z-index: 9999; display: none; align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: 1.5rem; right: 2rem; color: white; font-size: 2.4rem; cursor: pointer; background: none; border: none; line-height: 1; }
    .whatsapp-float { position: fixed; bottom: 2rem; right: 2rem; z-index: 99; }
    .whatsapp-float-btn { width: 52px; height: 52px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(37,211,102,.35); text-decoration: none; transition: transform .25s; }
    .whatsapp-float-btn:hover { transform: scale(1.08); }
    @media (max-width:900px) { .dash-header,.dash-main { padding-left:1.6rem; padding-right:1.6rem; } .stats-grid { grid-template-columns:1fr 1fr; } }
    @media (max-width:600px) { .stats-grid { grid-template-columns:1fr; } .agend-card { flex-direction:column; align-items:flex-start; } }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Isabela <span>Marques</span></a>
    <div style="display:flex;gap:.8rem;">
      <a href="index.html" class="btn-logout">← Site</a>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </div>
  </nav>

  <div class="dash-header">
    <div>
      <p class="section-label">Bem-vinda de volta</p>
      <h1 class="dash-greeting" id="greeting">Olá, <em>carregando...</em></h1>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;">
      <div id="foto-perfil-wrapper" style="position:relative;width:80px;height:80px;">
        <div id="foto-perfil-avatar" style="width:80px;height:80px;border-radius:50%;border:2px solid var(--rose-light);overflow:hidden;background:var(--rose-pale);display:flex;align-items:center;justify-content:center;cursor:pointer;" onclick="document.getElementById('foto-perfil-input').click()" title="Alterar foto">
          <svg id="foto-perfil-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--rose-light)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <img id="foto-perfil-img" src="" alt="Foto de perfil" style="display:none;width:100%;height:100%;object-fit:cover;" />
        </div>
        <div style="position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--rose);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--warm-white);" onclick="document.getElementById('foto-perfil-input').click()" title="Alterar foto">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
      </div>
      <input type="file" id="foto-perfil-input" accept="image/*" style="display:none;" onchange="uploadFotoPerfil(this)" />
      <span id="foto-perfil-status" style="font-size:.72rem;color:var(--text-muted);display:none;">Enviando...</span>
    </div>
  </div>

  <div class="dash-main" id="content">
    <div class="loading">Carregando seus dados...</div>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">×</button>
    <img id="lightbox-img" src="" alt="Foto da sessão" />
  </div>

  <div class="whatsapp-float">
    <a href="https://wa.me/5512981981418" target="_blank" class="whatsapp-float-btn" aria-label="WhatsApp">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.534 5.857L.054 23.447a.75.75 0 00.916.948l5.702-1.49A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.698-.512-5.24-1.406l-.374-.217-3.884 1.016 1.034-3.772-.237-.386A9.96 9.96 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
    </a>
  </div>

  <script>
    const SUPABASE_URL = 'https://uieblwzupapqgfdaipao.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpZWJsd3p1cGFwcWdmZGFpcGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjQ3MzIsImV4cCI6MjA4OTIwMDczMn0.JPn7XdRS2PS5ByEVhRo8OslaAfXFESNRCrEl_BPx1HY';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function uploadFotoPerfil(input) {
      const file = input.files[0];
      if (!file || !window._userId) return;
      const status = document.getElementById('foto-perfil-status');
      status.style.display = 'block'; status.textContent = 'Enviando...';

      const ext = file.name.split('.').pop();
      const path = `${window._userId}/perfil.${ext}`;
      const { error: upErr } = await sb.storage.from('fotos-perfil').upload(path, file, { upsert: true });
      if (upErr) { status.textContent = 'Erro ao enviar.'; return; }

      const { data: { publicUrl } } = sb.storage.from('fotos-perfil').getPublicUrl(path);
      await sb.from('profiles').update({ foto_url: publicUrl }).eq('id', window._userId);

      // Atualiza o avatar na tela
      document.getElementById('foto-perfil-img').src = publicUrl + '?t=' + Date.now();
      document.getElementById('foto-perfil-img').style.display = 'block';
      document.getElementById('foto-perfil-icon').style.display = 'none';
      status.textContent = 'Foto atualizada!';
      setTimeout(() => { status.style.display = 'none'; }, 2000);
    }

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single();
      if (profile?.is_admin) { window.location.href = 'admin-dashboard.html'; return; }

      const nome = profile?.nome || session.user.email;
      document.getElementById('greeting').innerHTML = `Olá, <em>${nome.split(' ')[0]}</em>`;

      const userId = session.user.id;

      // Guarda userId global para uso no upload
      window._userId = userId;

      // Carrega foto de perfil se existir
      if (profile?.foto_url) {
        document.getElementById('foto-perfil-img').src = profile.foto_url;
        document.getElementById('foto-perfil-img').style.display = 'block';
        document.getElementById('foto-perfil-icon').style.display = 'none';
      }
      const [sessaoRes, agendRes] = await Promise.all([
        sb.from('sessoes').select('*, servicos(nome), fotos_sessao(*), produtos_sessao(*, produtos(*))').eq('cliente_id', userId).order('data_sessao', { ascending: false }),
        sb.from('agendamentos').select('*, servicos(nome)').eq('cliente_id', userId).gte('data_agendamento', new Date().toISOString()).order('data_agendamento', { ascending: true })
      ]);

      const sessoes = sessaoRes.data || [];
      const agendamentos = agendRes.data || [];
      let html = '';

      // STATS
      html += `<div class="stats-grid">
        <div class="stat-card"><div class="stat-number">${sessoes.length}</div><div class="stat-label">Sessões realizadas</div></div>
        <div class="stat-card"><div class="stat-number">${agendamentos.length}</div><div class="stat-label">Próximos agendamentos</div></div>
        <div class="stat-card"><div class="stat-number">${sessoes.filter(s=>s.fotos_sessao?.length>0).length}</div><div class="stat-label">Sessões com fotos</div></div>
      </div>`;

      // AGENDAMENTOS
      html += `<div class="dash-section"><p class="section-label">Em breve</p><h2 class="dash-section-title">Próximos <em>Agendamentos</em></h2>`;
      if (!agendamentos.length) {
        html += `<div class="empty-state"><div class="empty-icon">📅</div><p class="empty-text">Nenhum agendamento futuro.<br>Entre em contato pelo WhatsApp para agendar.</p></div>`;
      } else {
        html += `<div class="agend-list">`;
        agendamentos.forEach(a => {
          const dt = new Date(a.data_agendamento);
          html += `<div class="agend-card">
            <div class="agend-date">${dt.getDate()}<span>${dt.toLocaleString('pt-BR',{month:'short'})}</span></div>
            <div class="agend-info">
              <div class="agend-servico">${a.servicos?.nome||'Atendimento'}</div>
              ${a.observacoes?`<div class="agend-obs">${a.observacoes}</div>`:''}
              <div style="font-size:.82rem;color:var(--text-muted);margin-top:.3rem;">${dt.toLocaleString('pt-BR',{weekday:'long',hour:'2-digit',minute:'2-digit'})}</div>
            </div>
            <span class="agend-status ${a.status}">${a.status}</span>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;

      // SESSÕES
      html += `<div class="dash-section"><p class="section-label">Seu histórico</p><h2 class="dash-section-title">Histórico de <em>Tratamentos</em></h2>`;
      if (!sessoes.length) {
        html += `<div class="empty-state"><div class="empty-icon">✦</div><p class="empty-text">Seu histórico aparecerá aqui após a primeira sessão.</p></div>`;
      } else {
        html += `<div class="sessoes-list">`;
        sessoes.forEach((s, i) => {
          const dt = new Date(s.data_sessao);
          const dtFmt = dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
          const fotos = s.fotos_sessao || [];
          const produtos = s.produtos_sessao || [];
          html += `<div class="sessao-card">
            <div class="sessao-header" onclick="toggle('s${i}')">
              <div style="display:flex;align-items:center;gap:1.4rem;">
                <span class="sessao-data">${dtFmt}</span>
                <span class="sessao-servico">${s.servicos?.nome||'Atendimento'}</span>
              </div>
              <span class="sessao-toggle" id="tog-s${i}">Ver detalhes ↓</span>
            </div>
            <div class="sessao-body" id="body-s${i}">`;
          if (s.evolucao||s.observacoes) html += `<p class="sessao-obs">${s.evolucao||s.observacoes}</p>`;
          if (fotos.length) {
            html += `<p class="section-label" style="margin-bottom:.6rem;">Fotos da sessão</p><div class="fotos-grid">`;
            fotos.forEach(f => { html += `<div class="foto-item" onclick="openLightbox('${f.url}')"><img src="${f.url}" alt="${f.tipo}" loading="lazy"/><span class="foto-tipo">${f.tipo}</span></div>`; });
            html += `</div>`;
          }
          if (produtos.length) {
            html += `<p class="section-label" style="margin-bottom:.6rem;margin-top:.8rem;">Produtos utilizados</p><div class="produtos-tags">`;
            produtos.forEach(p => { html += `<span class="produto-tag">${p.produtos?.nome||''}${p.produtos?.marca?' · '+p.produtos.marca:''}</span>`; });
            html += `</div>`;
          }
          html += `</div></div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;

      document.getElementById('content').innerHTML = html;
    }

    function toggle(id) {
      const b = document.getElementById('body-'+id), t = document.getElementById('tog-'+id);
      const o = b.classList.toggle('open');
      t.textContent = o ? 'Fechar ↑' : 'Ver detalhes ↓';
    }
    function openLightbox(url) { document.getElementById('lightbox-img').src=url; document.getElementById('lightbox').classList.add('open'); }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
    async function handleLogout() { await sb.auth.signOut(); window.location.href='index.html'; }

    init();
  </script>
</body>
</html>
